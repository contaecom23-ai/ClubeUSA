<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmando email — Clube USA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col items-center justify-center px-4">

  <a href="index.html" class="text-blue-800 font-bold text-xl tracking-tight mb-8">Clube USA</a>

  <div class="w-full max-w-sm bg-white rounded-2xl shadow-sm border border-slate-100 p-8 text-center">

    <!-- Carregando -->
    <div id="loading-state">
      <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
      <p class="text-slate-600 text-sm">Confirmando seu email…</p>
    </div>

    <!-- Sucesso -->
    <div id="success-state" class="hidden">
      <div class="text-5xl mb-4">✅</div>
      <h1 class="text-xl font-bold text-green-700 mb-2">Email confirmado!</h1>
      <p class="text-sm text-slate-500 mb-6">Sua conta está ativa. Redirecionando para o seu perfil…</p>
      <a href="profile.html"
         class="inline-block px-6 py-2 bg-blue-700 text-white rounded-lg text-sm font-medium hover:bg-blue-800 transition">
        Ir para meu perfil
      </a>
    </div>

    <!-- Erro -->
    <div id="error-state" class="hidden">
      <div class="text-5xl mb-4">❌</div>
      <h1 class="text-xl font-bold text-red-700 mb-2">Link inválido ou expirado</h1>
      <p class="text-sm text-slate-500 mb-6" id="error-detail">
        O link de confirmação expirou ou já foi usado.
      </p>
      <a href="register.html"
         class="inline-block px-6 py-2 bg-blue-700 text-white rounded-lg text-sm font-medium hover:bg-blue-800 transition">
        Criar conta novamente
      </a>
    </div>
  </div>

  <script>
    const sb = supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseAnonKey);

    function showState(id) {
      ['loading-state', 'success-state', 'error-state'].forEach(s => {
        document.getElementById(s).classList.toggle('hidden', s !== id);
      });
    }

    // O supabase-js v2 lê automaticamente os tokens do URL hash (#access_token=...)
    // e dispara o evento SIGNED_IN quando a verificação é bem-sucedida.
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session) {
        showState('success-state');
        setTimeout(() => { window.location.href = 'profile.html'; }, 2000);
      } else if (event === 'TOKEN_REFRESHED') {
        // já estava logado, redireciona direto
        window.location.href = 'profile.html';
      }
    });

    // Fallback: checar se já tem sessão após 3s (caso o evento não dispare)
    setTimeout(async () => {
      const { data: { session }, error } = await sb.auth.getSession();
      if (session) {
        showState('success-state');
        setTimeout(() => { window.location.href = 'profile.html'; }, 1500);
      } else if (document.getElementById('loading-state').classList.contains('hidden') === false) {
        // Ainda no estado de loading — nenhum evento disparou
        showState('error-state');
        if (error) {
          document.getElementById('error-detail').textContent = error.message;
        }
      }
    }, 3000);
  </script>
</body>
</html>
