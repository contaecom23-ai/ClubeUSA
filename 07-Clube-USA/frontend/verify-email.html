<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmar Email — Clube USA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #1a56db; --text: #111928; --muted: #6b7280;
      --border: #d1d5db; --bg: #f9fafb; --error: #dc2626; --success: #057a55;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: var(--bg); color: var(--text); min-height: 100vh;
           display: flex; flex-direction: column; }
    a { color: var(--blue); }
    header { padding: 16px 24px; border-bottom: 1px solid var(--border); background: #fff; }
    .logo { font-size: 1.3rem; font-weight: 700; color: var(--blue); text-decoration: none; }
    .logo span { color: #057a55; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
    .card { background: #fff; border: 1px solid var(--border); border-radius: 12px;
            padding: 48px 36px; width: 100%; max-width: 440px; text-align: center; }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; }
    p { color: var(--muted); font-size: 0.95rem; line-height: 1.6; }
    .btn { display: inline-block; margin-top: 28px; padding: 12px 28px; background: var(--blue);
           color: #fff; border-radius: 8px; font-weight: 700; font-size: 0.95rem;
           text-decoration: none; }
    footer { text-align: center; padding: 16px; color: var(--muted); font-size: 0.82rem; }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo">Clube<span>USA</span></a>
  </header>

  <main>
    <div class="card" id="card">
      <div class="icon">⏳</div>
      <h1>Verificando seu email...</h1>
      <p>Aguarde um momento.</p>
    </div>
  </main>

  <footer>© 2025 Clube USA</footer>

  <script>
    const API_URL = 'http://localhost:8000/api/v1';

    async function verify() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const card = document.getElementById('card');

      if (!token) {
        card.innerHTML = `
          <div class="icon">❌</div>
          <h1>Link inválido</h1>
          <p>Nenhum token encontrado. Use o link enviado para o seu email.</p>
          <a href="login.html" class="btn">Ir para o login</a>`;
        return;
      }

      try {
        const resp = await fetch(`${API_URL}/auth/verify-email?token=${encodeURIComponent(token)}`);
        const data = await resp.json();

        if (resp.ok) {
          card.innerHTML = `
            <div class="icon">✅</div>
            <h1>Email confirmado!</h1>
            <p>${data.message}</p>
            <a href="login.html" class="btn">Fazer login</a>`;
        } else {
          const isExpired = data.detail && data.detail.includes('expirado');
          card.innerHTML = `
            <div class="icon">❌</div>
            <h1>${isExpired ? 'Link expirado' : 'Erro na confirmação'}</h1>
            <p>${data.detail || 'Não foi possível confirmar seu email.'}</p>
            ${isExpired
              ? '<a href="login.html" class="btn">Reenviar confirmação</a>'
              : '<a href="register.html" class="btn">Tentar novamente</a>'}`;
        }
      } catch (_) {
        card.innerHTML = `
          <div class="icon">❌</div>
          <h1>Erro de conexão</h1>
          <p>Não foi possível conectar ao servidor. Verifique sua internet e tente novamente.</p>
          <a href="login.html" class="btn">Voltar ao login</a>`;
      }
    }

    verify();
  </script>
</body>
</html>
