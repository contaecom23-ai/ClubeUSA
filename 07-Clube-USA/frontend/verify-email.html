<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmar email — Clube USA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,.10);
      padding: 40px 36px;
      width: 100%;
      max-width: 440px;
      text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 12px; }
    p { font-size: 15px; color: #555; line-height: 1.6; margin-bottom: 20px; }
    .btn {
      display: inline-block;
      background: #1a56db;
      color: #fff;
      border-radius: 7px;
      padding: 11px 28px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: background .15s;
    }
    .btn:hover { background: #1648c0; }
    .spinner {
      border: 3px solid #e5e7eb;
      border-top-color: #1a56db;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      animation: spin .8s linear infinite;
      margin: 16px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading { display: block; }
    #success, #error { display: none; }
  </style>
</head>
<body>
<div class="card">
  <!-- Loading state -->
  <div id="loading">
    <div class="spinner"></div>
    <p>Verificando seu email…</p>
  </div>

  <!-- Success state -->
  <div id="success">
    <div class="icon">✅</div>
    <h1>Email confirmado!</h1>
    <p>Sua conta está ativa. Agora você pode entrar no Clube USA.</p>
    <a href="login.html" class="btn">Entrar na minha conta</a>
  </div>

  <!-- Error state -->
  <div id="error">
    <div class="icon">❌</div>
    <h1>Link inválido ou expirado</h1>
    <p id="errorMsg">Este link não é mais válido. Solicite um novo email de confirmação.</p>
    <a href="register.html" class="btn">Voltar ao cadastro</a>
  </div>
</div>

<script>
  const API = window.CLUBE_USA_API || 'http://localhost:8000';

  async function verifyToken() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      showError('Link inválido. Verifique o email que enviamos e tente novamente.');
      return;
    }

    try {
      const res = await fetch(`${API}/auth/verify-email`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token }),
      });
      const data = await res.json();

      if (res.ok) {
        showSuccess();
      } else {
        showError(data.detail || 'Link inválido ou expirado.');
      }
    } catch (_) {
      showError('Erro de conexão. Tente novamente em instantes.');
    }
  }

  function showSuccess() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('success').style.display = 'block';
  }

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('errorMsg').textContent = msg;
    document.getElementById('error').style.display = 'block';
  }

  verifyToken();
</script>
</body>
</html>
