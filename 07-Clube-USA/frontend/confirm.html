<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clube USA — Confirmação de Email</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    h2 { font-size: 1.4rem; color: #111827; margin-bottom: 12px; }
    p  { color: #6b7280; font-size: 0.95rem; line-height: 1.6; }

    .btn {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 28px;
      background: #1a56db;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.15s;
    }
    .btn:hover { background: #1447c0; }

    .spinner {
      border: 3px solid #e5e7eb;
      border-top-color: #1a56db;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading { display: block; }
    #success  { display: none; }
    #error    { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div id="loading">
      <div class="spinner"></div>
      <h2>Confirmando seu email...</h2>
      <p>Aguarde um momento.</p>
    </div>

    <div id="success">
      <div class="icon">✅</div>
      <h2>Email confirmado!</h2>
      <p>Sua conta foi ativada com sucesso. Você já pode usar o Clube USA.</p>
      <a href="/login" class="btn">Entrar na conta</a>
    </div>

    <div id="error">
      <div class="icon">❌</div>
      <h2>Link inválido ou expirado</h2>
      <p id="error-msg">Este link de confirmação não é mais válido. Solicite um novo.</p>
      <a href="/login" class="btn">Voltar para login</a>
    </div>
  </div>

  <script>
    const API = '/api/auth';

    function show(id) {
      ['loading','success','error'].forEach(s => {
        document.getElementById(s).style.display = s === id ? 'block' : 'none';
      });
    }

    (async () => {
      const params = new URLSearchParams(window.location.search);
      const token  = params.get('token');

      if (!token) {
        show('error');
        document.getElementById('error-msg').textContent = 'Link de confirmação inválido.';
        return;
      }

      try {
        const res = await fetch(`${API}/confirm?token=${encodeURIComponent(token)}`);

        if (res.ok) {
          const data = await res.json();
          // Armazena o token para acesso direto ao app
          localStorage.setItem('clubeusa_token', data.access_token);
          show('success');
        } else {
          const data = await res.json().catch(() => ({}));
          show('error');
          if (data.detail) {
            document.getElementById('error-msg').textContent = data.detail;
          }
        }
      } catch {
        show('error');
        document.getElementById('error-msg').textContent =
          'Erro de conexão. Verifique sua internet e tente novamente.';
      }
    })();
  </script>
</body>
</html>
