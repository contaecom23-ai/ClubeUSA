<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil — Clube USA</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50">
  <!-- Nav -->
  <nav class="bg-white border-b border-gray-100 px-4 py-3 flex items-center justify-between">
    <a href="#" class="text-blue-700 font-bold text-lg">🇧🇷 Clube USA</a>
    <button id="logoutBtn" class="text-sm text-gray-500 hover:text-red-600 transition-colors">Sair</button>
  </nav>

  <div class="max-w-lg mx-auto px-4 py-8">
    <h2 class="text-xl font-semibold text-gray-800 mb-6">Meu Perfil</h2>

    <div id="loadingState" class="text-center text-gray-400 py-8">Carregando...</div>

    <div id="profileContent" class="hidden">
      <div id="alert" class="hidden mb-4 p-3 rounded-lg text-sm"></div>

      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-4">
        <div class="flex items-center gap-3 mb-4">
          <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold text-lg" id="avatar">?</div>
          <div>
            <p class="font-semibold text-gray-800" id="displayName">–</p>
            <p class="text-sm text-gray-500" id="displayEmail">–</p>
          </div>
        </div>
        <div id="emailWarning" class="hidden bg-yellow-50 border border-yellow-200 rounded-lg p-3 text-sm text-yellow-800">
          ⚠️ Email ainda não confirmado. Verifique sua caixa de entrada.
        </div>
      </div>

      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <h3 class="font-medium text-gray-700 mb-4">Editar informações</h3>
        <form id="profileForm">
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1" for="full_name">Nome completo</label>
            <input id="full_name" type="text" autocomplete="name"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1" for="zip_code">
              ZIP Code <span class="text-gray-400 font-normal">(opcional)</span>
            </label>
            <input id="zip_code" type="text" autocomplete="postal-code" maxlength="10"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="10001">
          </div>
          <button type="submit" id="saveBtn"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition-colors text-sm">
            Salvar alterações
          </button>
        </form>
      </div>

      <p class="text-center text-xs text-gray-400 mt-6" id="memberSince">Membro desde –</p>
    </div>
  </div>

  <script>
    const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:8000'
      : '';

    const token = localStorage.getItem('clubeusa_token');
    if (!token) window.location.href = 'login.html';

    const alertEl = document.getElementById('alert');

    function showAlert(msg, type = 'error') {
      alertEl.className = `mb-4 p-3 rounded-lg text-sm ${type === 'error' ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-green-50 text-green-700 border border-green-200'}`;
      alertEl.textContent = msg;
      alertEl.classList.remove('hidden');
      setTimeout(() => alertEl.classList.add('hidden'), 4000);
    }

    async function loadProfile() {
      try {
        const res = await fetch(`${API_BASE}/auth/me`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (res.status === 401 || res.status === 403) {
          localStorage.removeItem('clubeusa_token');
          window.location.href = 'login.html';
          return;
        }
        const user = await res.json();

        document.getElementById('avatar').textContent = (user.full_name || '?')[0].toUpperCase();
        document.getElementById('displayName').textContent = user.full_name;
        document.getElementById('displayEmail').textContent = user.email;
        document.getElementById('full_name').value = user.full_name;
        document.getElementById('zip_code').value = user.zip_code || '';
        document.getElementById('memberSince').textContent =
          'Membro desde ' + new Date(user.created_at).toLocaleDateString('pt-BR', { year: 'numeric', month: 'long' });

        if (!user.email_confirmed) {
          document.getElementById('emailWarning').classList.remove('hidden');
        }

        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('profileContent').classList.remove('hidden');
      } catch {
        document.getElementById('loadingState').textContent = 'Erro ao carregar perfil.';
      }
    }

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const full_name = document.getElementById('full_name').value.trim();
      const zip_code = document.getElementById('zip_code').value.trim() || null;
      const saveBtn = document.getElementById('saveBtn');

      if (!full_name) { showAlert('Nome não pode ser vazio.'); return; }

      saveBtn.disabled = true;
      saveBtn.textContent = 'Salvando...';

      try {
        const res = await fetch(`${API_BASE}/auth/me`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({ full_name, zip_code }),
        });
        const data = await res.json();
        if (res.ok) {
          document.getElementById('displayName').textContent = data.full_name;
          document.getElementById('avatar').textContent = (data.full_name || '?')[0].toUpperCase();
          showAlert('✅ Perfil atualizado!', 'success');
        } else {
          showAlert(data.detail || 'Erro ao salvar.');
        }
      } catch {
        showAlert('Erro de conexão. Tente novamente.');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Salvar alterações';
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('clubeusa_token');
      window.location.href = 'login.html';
    });

    loadProfile();
  </script>
</body>
</html>
