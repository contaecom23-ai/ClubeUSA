<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Perfil — Clube USA</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  .profile-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .btn-sm { width: auto; padding: 8px 16px; font-size: .85rem; margin-top: 0; }
  .btn-outline {
    background: none; border: 2px solid var(--green); color: var(--green);
    border-radius: var(--radius); padding: 8px 16px; font-weight: 700;
    cursor: pointer; font-size: .85rem; transition: all .2s;
  }
  .btn-outline:hover { background: var(--green); color: #fff; }
  .badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: .75rem; font-weight: 700; }
  .badge.confirmed   { background: #dcfce7; color: #166534; }
  .badge.unconfirmed { background: #fef9c3; color: #854d0e; }
</style>
</head>
<body>
<div class="logo">Clube <span>USA</span></div>
<div class="card">
  <div class="profile-header">
    <h1>Meu Perfil</h1>
    <button class="btn-outline" onclick="logout()">Sair</button>
  </div>
  <div id="loading">Carregando...</div>
  <form id="profileForm" novalidate style="display:none">
    <div style="margin-bottom:14px">
      <strong id="displayName"></strong><br>
      <span id="displayEmail" style="color:var(--muted);font-size:.9rem"></span>
      &nbsp;<span id="emailBadge" class="badge"></span>
    </div>
    <div class="form-group">
      <label for="fullName">Nome completo</label>
      <input id="fullName" type="text" required>
    </div>
    <div class="form-group">
      <label for="phone">Telefone</label>
      <input id="phone" type="tel">
    </div>
    <div class="form-group">
      <label for="zipCode">ZIP Code</label>
      <input id="zipCode" type="text" maxlength="10">
    </div>
    <div class="form-group">
      <label for="city">Cidade</label>
      <input id="city" type="text">
    </div>
    <div class="form-group">
      <label for="state">Estado</label>
      <input id="state" type="text" maxlength="2" placeholder="NY">
    </div>
    <button type="submit" class="btn" data-label="Salvar alterações">Salvar alterações</button>
    <div id="msg" class="msg"></div>
  </form>
</div>

<script src="assets/auth.js"></script>
<script>
async function loadProfile() {
  let { ok, status, data } = await apiFetch("/users/me");
  if (status === 401) {
    const refreshed = await tryRefresh();
    if (refreshed) ({ ok, data } = await apiFetch("/users/me"));
  }
  if (!ok) { window.location.href = "login.html"; return; }

  document.getElementById("loading").style.display = "none";
  document.getElementById("profileForm").style.display = "block";
  document.getElementById("displayName").textContent = data.full_name;
  document.getElementById("displayEmail").textContent = data.email;

  const badge = document.getElementById("emailBadge");
  if (data.email_confirmed) {
    badge.textContent = "Email confirmado";
    badge.className = "badge confirmed";
  } else {
    badge.textContent = "Email pendente";
    badge.className = "badge unconfirmed";
  }

  document.getElementById("fullName").value = data.full_name || "";
  document.getElementById("phone").value = data.phone || "";
  document.getElementById("zipCode").value = data.zip_code || "";
  document.getElementById("city").value = data.city || "";
  document.getElementById("state").value = data.state || "";
}

document.getElementById("profileForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  const btn = this.querySelector("button[type=submit]");
  const msg = document.getElementById("msg");
  setLoading(btn, true);

  const payload = {};
  const fullName = document.getElementById("fullName").value.trim();
  if (fullName) payload.full_name = fullName;
  const phone = document.getElementById("phone").value.trim();
  if (phone) payload.phone = phone;
  const zip = document.getElementById("zipCode").value.trim();
  if (zip) payload.zip_code = zip;
  const city = document.getElementById("city").value.trim();
  if (city) payload.city = city;
  const state = document.getElementById("state").value.trim();
  if (state) payload.state = state;

  const { ok, data } = await apiFetch("/users/me", {
    method: "PUT",
    body: JSON.stringify(payload),
  });

  setLoading(btn, false);
  if (ok) {
    showMsg(msg, "Perfil atualizado com sucesso.", "success");
    document.getElementById("displayName").textContent = data.full_name;
  } else {
    showMsg(msg, data.detail || "Erro ao salvar.", "error");
  }
});

function logout() {
  clearTokens();
  window.location.href = "login.html";
}

loadProfile();
</script>
</body>
</html>
