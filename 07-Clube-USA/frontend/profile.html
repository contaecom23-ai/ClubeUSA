<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu perfil — Clube USA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      padding: 32px 16px;
    }
    header {
      max-width: 600px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { font-size: 22px; font-weight: 700; color: #1a56db; }
    .logout { font-size: 14px; color: #666; cursor: pointer; text-decoration: underline; border: none; background: none; }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,.10);
      padding: 32px 28px;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 24px; }
    .avatar {
      width: 64px; height: 64px;
      background: #1a56db;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      color: #fff;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    input {
      width: 100%;
      border: 1.5px solid #d1d5db;
      border-radius: 7px;
      padding: 9px 12px;
      font-size: 15px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: #1a56db; }
    input[readonly] { background: #f9fafb; color: #666; cursor: default; }
    .row { display: flex; gap: 12px; }
    .row > .field { flex: 1; }
    .badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 999px;
      margin-left: 8px;
    }
    .badge.verified { background: #d1fae5; color: #065f46; }
    .save-btn {
      background: #1a56db;
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 11px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      margin-top: 8px;
    }
    .save-btn:hover { background: #1648c0; }
    .save-btn:disabled { background: #9cb5f0; cursor: not-allowed; }
    .msg {
      margin-top: 12px;
      padding: 9px 14px;
      border-radius: 7px;
      font-size: 14px;
      display: none;
    }
    .msg.success { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; display: block; }
    .msg.error   { background: #fff1f2; color: #9f1239; border: 1px solid #fca5a5; display: block; }
    .joined { font-size: 13px; color: #888; margin-top: 20px; }
  </style>
</head>
<body>
<header>
  <div class="logo">🇺🇸 Clube USA</div>
  <button class="logout" onclick="logout()">Sair</button>
</header>

<div class="card">
  <div id="loadingState" style="color:#888;padding:20px 0">Carregando perfil…</div>

  <div id="profileSection" style="display:none">
    <div class="avatar" id="avatarInitial">?</div>
    <h1>Meu Perfil <span class="badge verified" id="verifiedBadge" style="display:none">✓ Email verificado</span></h1>

    <form id="profileForm" novalidate>
      <div class="field">
        <label>Nome</label>
        <input type="text" id="name" name="name" autocomplete="name">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" name="email" readonly>
      </div>
      <div class="row">
        <div class="field">
          <label>ZIP Code</label>
          <input type="text" id="zip_code" name="zip_code" placeholder="33101" maxlength="10">
        </div>
        <div class="field">
          <label>Estado</label>
          <input type="text" id="state_abbr" name="state_abbr" placeholder="FL" maxlength="2">
        </div>
      </div>

      <button type="submit" class="save-btn" id="saveBtn">Salvar alterações</button>
      <div class="msg" id="msg"></div>
    </form>

    <div class="joined" id="joinedDate"></div>
  </div>
</div>

<script>
  const API = window.CLUBE_USA_API || 'http://localhost:8000';

  function getToken() {
    return sessionStorage.getItem('access_token');
  }

  function logout() {
    sessionStorage.removeItem('access_token');
    sessionStorage.removeItem('refresh_token');
    window.location.href = 'login.html';
  }

  async function loadProfile() {
    const token = getToken();
    if (!token) {
      window.location.href = 'login.html';
      return;
    }

    try {
      const res = await fetch(`${API}/users/me`, {
        headers: { Authorization: `Bearer ${token}` },
      });

      if (res.status === 401) {
        logout();
        return;
      }

      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Erro ao carregar perfil.');

      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('profileSection').style.display = 'block';

      document.getElementById('name').value = data.name || '';
      document.getElementById('email').value = data.email || '';
      document.getElementById('zip_code').value = data.zip_code || '';
      document.getElementById('state_abbr').value = data.state_abbr || '';
      document.getElementById('avatarInitial').textContent = (data.name || '?')[0].toUpperCase();

      if (data.email_verified) {
        document.getElementById('verifiedBadge').style.display = 'inline-block';
      }

      if (data.created_at) {
        const d = new Date(data.created_at);
        document.getElementById('joinedDate').textContent =
          `Membro desde ${d.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' })}`;
      }
    } catch (err) {
      document.getElementById('loadingState').textContent = 'Erro ao carregar perfil. Tente recarregar a página.';
    }
  }

  document.getElementById('profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('saveBtn');
    const msg = document.getElementById('msg');
    msg.className = 'msg';
    msg.textContent = '';

    const updates = {};
    const name = document.getElementById('name').value.trim();
    const zip = document.getElementById('zip_code').value.trim();
    const state = document.getElementById('state_abbr').value.trim().toUpperCase();

    if (name) updates.name = name;
    if (zip) updates.zip_code = zip;
    if (state) updates.state_abbr = state;

    if (Object.keys(updates).length === 0) {
      msg.className = 'msg error';
      msg.textContent = 'Nenhuma alteração para salvar.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Salvando…';

    try {
      const res = await fetch(`${API}/users/me`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${getToken()}`,
        },
        body: JSON.stringify(updates),
      });
      const data = await res.json();

      if (res.ok) {
        msg.className = 'msg success';
        msg.textContent = 'Perfil atualizado com sucesso!';
        document.getElementById('avatarInitial').textContent = (data.name || '?')[0].toUpperCase();
      } else {
        msg.className = 'msg error';
        msg.textContent = data.detail || 'Erro ao salvar. Tente novamente.';
      }
    } catch (_) {
      msg.className = 'msg error';
      msg.textContent = 'Erro de conexão.';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Salvar alterações';
    }
  });

  loadProfile();
</script>
</body>
</html>
