<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu perfil — Clube USA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col">

  <nav class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between">
    <a href="index.html" class="text-blue-800 font-bold text-xl tracking-tight">Clube USA</a>
    <button id="logout-btn"
            class="px-4 py-2 text-sm text-slate-500 hover:text-red-600 font-medium transition">
      Sair
    </button>
  </nav>

  <main class="flex-1 max-w-2xl mx-auto w-full px-4 py-10">

    <!-- Carregando -->
    <div id="loading" class="text-center py-20">
      <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
      <p class="text-slate-500 text-sm">Carregando perfil…</p>
    </div>

    <!-- Conteúdo do perfil -->
    <div id="profile-content" class="hidden space-y-6">

      <!-- Banner: email não verificado -->
      <div id="unverified-banner" class="hidden bg-amber-50 border border-amber-200 rounded-xl p-4 flex items-start gap-3">
        <span class="text-amber-500 text-xl mt-0.5">⚠️</span>
        <div class="flex-1">
          <p class="text-sm font-medium text-amber-800">Confirme seu email para ativar sua conta</p>
          <p class="text-xs text-amber-600 mt-0.5">
            Verifique sua caixa de entrada (e spam) para o link de confirmação.
          </p>
        </div>
        <button id="resend-btn"
                class="text-xs text-amber-700 underline hover:text-amber-900 whitespace-nowrap">
          Reenviar
        </button>
      </div>

      <!-- Mensagem de feedback (save) -->
      <div id="feedback-msg" class="hidden rounded-xl p-3 text-sm text-center"></div>

      <!-- Card do perfil -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <div class="flex items-center gap-4 mb-6">
          <div class="w-14 h-14 rounded-full bg-blue-100 flex items-center justify-center text-2xl font-bold text-blue-700"
               id="avatar-initials">?</div>
          <div>
            <h1 class="font-bold text-lg text-slate-900" id="display-name">—</h1>
            <p class="text-sm text-slate-500" id="display-email">—</p>
            <span id="verified-badge"
                  class="hidden inline-block mt-1 text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-medium">
              ✓ Email verificado
            </span>
          </div>
        </div>

        <form id="profile-form" class="space-y-4" novalidate>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Nome</label>
              <input id="first_name" type="text" autocomplete="given-name"
                     class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Sobrenome</label>
              <input id="last_name" type="text" autocomplete="family-name"
                     class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Telefone</label>
            <input id="phone" type="tel" autocomplete="tel"
                   placeholder="(555) 000-0000"
                   class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>

          <div class="grid grid-cols-3 gap-3">
            <div class="col-span-1">
              <label class="block text-sm font-medium text-slate-700 mb-1">ZIP Code</label>
              <input id="zip_code" type="text" autocomplete="postal-code"
                     placeholder="10001"
                     class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
            </div>
            <div class="col-span-1">
              <label class="block text-sm font-medium text-slate-700 mb-1">Estado</label>
              <input id="state" type="text" maxlength="2"
                     placeholder="NY"
                     class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 uppercase" />
            </div>
            <div class="col-span-1">
              <label class="block text-sm font-medium text-slate-700 mb-1">Cidade</label>
              <input id="city" type="text" autocomplete="address-level2"
                     placeholder="New York"
                     class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
            </div>
          </div>

          <button type="submit" id="save-btn"
                  class="w-full py-2.5 bg-blue-700 hover:bg-blue-800 text-white font-semibold rounded-lg text-sm transition disabled:opacity-50 mt-2">
            Salvar alterações
          </button>
        </form>
      </div>
    </div>
  </main>

  <script>
    const sb = supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseAnonKey);

    let _session = null;

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) {
        window.location.href = 'login.html';
        return;
      }
      _session = session;
      await loadProfile(session);
    }

    async function loadProfile(session) {
      const user = session.user;

      // Verificar email
      const emailVerified = !!user.email_confirmed_at;
      document.getElementById('display-email').textContent = user.email || '';
      if (!emailVerified) {
        document.getElementById('unverified-banner').classList.remove('hidden');
      } else {
        document.getElementById('verified-badge').classList.remove('hidden');
      }

      // Buscar perfil na API
      let profile = null;
      try {
        const res = await fetch(`${CONFIG.apiBaseUrl}/profile`, {
          headers: { 'Authorization': `Bearer ${session.access_token}` },
        });
        if (res.ok) {
          profile = await res.json();
        }
      } catch (err) {
        console.error('Erro ao buscar perfil:', err);
      }

      // Preencher campos
      const firstName = profile?.first_name || '';
      const lastName  = profile?.last_name  || '';
      document.getElementById('first_name').value = firstName;
      document.getElementById('last_name').value  = lastName;
      document.getElementById('phone').value    = profile?.phone    || '';
      document.getElementById('zip_code').value = profile?.zip_code || '';
      document.getElementById('state').value    = profile?.state    || '';
      document.getElementById('city').value     = profile?.city     || '';

      // Avatar com iniciais
      const initials = ((firstName[0] || '') + (lastName[0] || '')).toUpperCase() || '?';
      document.getElementById('avatar-initials').textContent = initials;

      const displayName = [firstName, lastName].filter(Boolean).join(' ') || user.email;
      document.getElementById('display-name').textContent = displayName;

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('profile-content').classList.remove('hidden');
    }

    document.getElementById('profile-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('save-btn');
      const feedbackEl = document.getElementById('feedback-msg');

      feedbackEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Salvando…';

      const payload = {};
      const fields = ['first_name', 'last_name', 'phone', 'zip_code', 'state', 'city'];
      fields.forEach(f => {
        const val = document.getElementById(f).value.trim();
        if (val) payload[f] = val;
      });

      if (Object.keys(payload).length === 0) {
        feedbackEl.textContent = 'Nenhuma alteração para salvar.';
        feedbackEl.className = 'rounded-xl p-3 text-sm text-center bg-slate-100 text-slate-600';
        feedbackEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Salvar alterações';
        return;
      }

      try {
        const res = await fetch(`${CONFIG.apiBaseUrl}/profile`, {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${_session.access_token}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(payload),
        });

        const data = await res.json();

        if (res.ok) {
          feedbackEl.textContent = 'Perfil atualizado com sucesso!';
          feedbackEl.className = 'rounded-xl p-3 text-sm text-center bg-green-50 text-green-700 border border-green-200';
          feedbackEl.classList.remove('hidden');

          // Atualizar exibição
          const firstName = data.first_name || '';
          const lastName  = data.last_name  || '';
          const initials  = ((firstName[0] || '') + (lastName[0] || '')).toUpperCase() || '?';
          document.getElementById('avatar-initials').textContent = initials;
          const displayName = [firstName, lastName].filter(Boolean).join(' ') || _session.user.email;
          document.getElementById('display-name').textContent = displayName;
        } else {
          const detail = Array.isArray(data.detail)
            ? data.detail.map(d => d.msg).join(', ')
            : (data.detail || 'Erro ao salvar');
          feedbackEl.textContent = detail;
          feedbackEl.className = 'rounded-xl p-3 text-sm text-center bg-red-50 text-red-700 border border-red-200';
          feedbackEl.classList.remove('hidden');
        }
      } catch (err) {
        feedbackEl.textContent = 'Erro de conexão. Tente novamente.';
        feedbackEl.className = 'rounded-xl p-3 text-sm text-center bg-red-50 text-red-700 border border-red-200';
        feedbackEl.classList.remove('hidden');
      }

      btn.disabled = false;
      btn.textContent = 'Salvar alterações';
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await sb.auth.signOut();
      window.location.href = 'index.html';
    });

    document.getElementById('resend-btn').addEventListener('click', async () => {
      if (!_session) return;
      const { error } = await sb.auth.resend({
        type: 'signup',
        email: _session.user.email,
        options: { emailRedirectTo: `${window.location.origin}/verify-email.html` },
      });
      const btn = document.getElementById('resend-btn');
      btn.textContent = error ? 'Erro ao reenviar' : 'Email reenviado!';
      btn.disabled = true;
    });

    init();
  </script>
</body>
</html>
