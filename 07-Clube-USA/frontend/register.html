<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro — Clube USA</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-blue-700">🇧🇷 Clube USA</h1>
      <p class="text-gray-500 mt-1">Sua comunidade brasileira nos EUA</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
      <h2 class="text-xl font-semibold text-gray-800 mb-6">Criar conta gratuita</h2>

      <div id="alert" class="hidden mb-4 p-3 rounded-lg text-sm"></div>

      <form id="registerForm" novalidate>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1" for="full_name">
            Nome completo *
          </label>
          <input id="full_name" type="text" autocomplete="name" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="João Silva">
        </div>

        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1" for="email">
            Email *
          </label>
          <input id="email" type="email" autocomplete="email" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="joao@email.com">
        </div>

        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1" for="password">
            Senha * <span class="text-gray-400 font-normal">(mínimo 8 caracteres)</span>
          </label>
          <input id="password" type="password" autocomplete="new-password" required minlength="8"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1" for="zip_code">
            ZIP Code <span class="text-gray-400 font-normal">(opcional)</span>
          </label>
          <input id="zip_code" type="text" autocomplete="postal-code" maxlength="10"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="10001">
        </div>

        <button type="submit" id="submitBtn"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition-colors text-sm">
          Criar conta
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-4">
        Já tem conta? <a href="login.html" class="text-blue-600 hover:underline">Entrar</a>
      </p>
    </div>
  </div>

  <script>
    const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:8000'
      : '';  // mesmo domínio em produção

    const form = document.getElementById('registerForm');
    const alert = document.getElementById('alert');
    const submitBtn = document.getElementById('submitBtn');

    function showAlert(msg, type = 'error') {
      alert.className = `mb-4 p-3 rounded-lg text-sm ${type === 'error' ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-green-50 text-green-700 border border-green-200'}`;
      alert.textContent = msg;
      alert.classList.remove('hidden');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alert.classList.add('hidden');

      const full_name = document.getElementById('full_name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const zip_code = document.getElementById('zip_code').value.trim() || null;

      if (!full_name || !email || !password) {
        showAlert('Preencha todos os campos obrigatórios.');
        return;
      }
      if (password.length < 8) {
        showAlert('A senha deve ter pelo menos 8 caracteres.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Criando conta...';

      try {
        const res = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ full_name, email, password, zip_code }),
        });

        const data = await res.json();

        if (res.ok) {
          showAlert('✅ Conta criada! Verifique seu email para confirmar o cadastro.', 'success');
          form.reset();
        } else if (res.status === 409) {
          showAlert('Este email já está cadastrado. Tente fazer login.');
        } else {
          const detail = data.detail || (Array.isArray(data.detail) ? data.detail[0].msg : 'Erro inesperado.');
          showAlert(typeof detail === 'string' ? detail : 'Dados inválidos. Verifique as informações.');
        }
      } catch {
        showAlert('Erro de conexão. Tente novamente em alguns segundos.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Criar conta';
      }
    });
  </script>
</body>
</html>
