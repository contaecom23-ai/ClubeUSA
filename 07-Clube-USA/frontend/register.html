<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar conta — Clube USA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #1a56db; --blue-dark: #1241b0; --text: #111928;
      --muted: #6b7280; --border: #d1d5db; --bg: #f9fafb;
      --error: #dc2626; --success: #057a55; --radius: 8px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: var(--bg); color: var(--text); min-height: 100vh;
           display: flex; flex-direction: column; }
    a { color: var(--blue); }

    header { padding: 16px 24px; border-bottom: 1px solid var(--border); background: #fff; }
    .logo { font-size: 1.3rem; font-weight: 700; color: var(--blue); text-decoration: none; }
    .logo span { color: #057a55; }

    main { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px; }
    .card { background: #fff; border: 1px solid var(--border); border-radius: 12px;
            padding: 36px 32px; width: 100%; max-width: 440px; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: var(--muted); font-size: 0.95rem; margin-bottom: 28px; }

    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 6px; }
    input { width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius);
            padding: 10px 14px; font-size: 1rem; outline: none; transition: border-color .15s; }
    input:focus { border-color: var(--blue); }
    .hint { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

    .btn { width: 100%; padding: 12px; background: var(--blue); color: #fff; border: none;
           border-radius: var(--radius); font-size: 1rem; font-weight: 700; cursor: pointer;
           transition: background .15s; margin-top: 8px; }
    .btn:hover { background: var(--blue-dark); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .alert { border-radius: var(--radius); padding: 12px 16px; font-size: 0.9rem;
             margin-bottom: 20px; display: none; }
    .alert.error { background: #fef2f2; border: 1px solid #fecaca; color: var(--error); }
    .alert.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: var(--success); }

    .login-link { text-align: center; font-size: 0.9rem; color: var(--muted); margin-top: 20px; }
    footer { text-align: center; padding: 16px; color: var(--muted); font-size: 0.82rem; }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo">Clube<span>USA</span></a>
  </header>

  <main>
    <div class="card">
      <h1>Criar sua conta</h1>
      <p class="subtitle">Grátis, sem cartão de crédito.</p>

      <div id="alert" class="alert" role="alert"></div>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label for="full_name">Nome completo</label>
          <input type="text" id="full_name" name="full_name" required
                 autocomplete="name" maxlength="100" placeholder="Maria Silva" />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required
                 autocomplete="email" maxlength="254" placeholder="maria@email.com" />
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" required
                 autocomplete="new-password" maxlength="128" />
          <p class="hint">Mínimo 8 caracteres, 1 maiúscula e 1 número.</p>
        </div>

        <button type="submit" class="btn" id="submitBtn">Criar conta</button>
      </form>

      <p class="login-link">Já tem conta? <a href="login.html">Entrar</a></p>
    </div>
  </main>

  <footer>© 2025 Clube USA</footer>

  <script>
    // Change this to your deployed API URL before going to production
    const API_URL = 'http://localhost:8000/api/v1';

    const form = document.getElementById('registerForm');
    const alertEl = document.getElementById('alert');
    const submitBtn = document.getElementById('submitBtn');

    function showAlert(msg, type) {
      alertEl.textContent = msg;
      alertEl.className = `alert ${type}`;
      alertEl.style.display = 'block';
    }

    function hideAlert() {
      alertEl.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();

      const full_name = document.getElementById('full_name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!full_name || !email || !password) {
        showAlert('Por favor, preencha todos os campos.', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Criando conta...';

      try {
        const resp = await fetch(`${API_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ full_name, email, password }),
        });

        const data = await resp.json();

        if (resp.ok) {
          showAlert(data.message, 'success');
          form.reset();
          // Redirect to login after 3s so user can check their email
          setTimeout(() => { window.location.href = 'login.html'; }, 3000);
        } else {
          const msg = data.detail
            ? (Array.isArray(data.detail) ? data.detail.map(e => e.msg).join('; ') : data.detail)
            : 'Erro ao criar conta. Tente novamente.';
          showAlert(msg, 'error');
        }
      } catch (_) {
        showAlert('Erro de conexão. Verifique sua internet e tente novamente.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Criar conta';
      }
    });
  </script>
</body>
</html>
