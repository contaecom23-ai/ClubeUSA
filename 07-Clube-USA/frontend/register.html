<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro — Clube USA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .card { background: white; border-radius: 12px; padding: 36px; width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    h1 { color: #1a56db; font-size: 1.5rem; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 28px; }
    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: .85rem; font-weight: 500; color: #333; margin-bottom: 4px; }
    input, select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: .95rem; transition: border-color .2s; }
    input:focus, select:focus { outline: none; border-color: #1a56db; }
    .optional { color: #999; font-weight: normal; }
    button { width: 100%; padding: 12px; background: #1a56db; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background .2s; margin-top: 8px; }
    button:hover:not(:disabled) { background: #1648c4; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .msg { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: .9rem; display: none; }
    .msg.success { background: #e8f5e9; color: #2e7d32; display: block; }
    .msg.error { background: #fdecea; color: #c62828; display: block; }
    .login-link { text-align: center; margin-top: 20px; font-size: .9rem; color: #555; }
    .login-link a { color: #1a56db; text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Clube USA</h1>
    <p class="subtitle">Crie sua conta gratuita</p>

    <form id="form">
      <div class="field">
        <label for="name">Nome completo</label>
        <input id="name" type="text" placeholder="Seu nome" required>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="seu@email.com" required>
      </div>

      <div class="field">
        <label for="password">Senha <span class="optional">(mín. 8 caracteres)</span></label>
        <input id="password" type="password" placeholder="Crie uma senha segura" required minlength="8">
      </div>

      <div class="row">
        <div class="field">
          <label for="phone">Telefone <span class="optional">(opcional)</span></label>
          <input id="phone" type="tel" placeholder="+1 305 555-0100">
        </div>
        <div class="field">
          <label for="state">Estado <span class="optional">(opcional)</span></label>
          <select id="state">
            <option value="">Selecione</option>
            <option>AL</option><option>AK</option><option>AZ</option><option>AR</option>
            <option>CA</option><option>CO</option><option>CT</option><option>DE</option>
            <option>FL</option><option>GA</option><option>HI</option><option>ID</option>
            <option>IL</option><option>IN</option><option>IA</option><option>KS</option>
            <option>KY</option><option>LA</option><option>ME</option><option>MD</option>
            <option>MA</option><option>MI</option><option>MN</option><option>MS</option>
            <option>MO</option><option>MT</option><option>NE</option><option>NV</option>
            <option>NH</option><option>NJ</option><option>NM</option><option>NY</option>
            <option>NC</option><option>ND</option><option>OH</option><option>OK</option>
            <option>OR</option><option>PA</option><option>RI</option><option>SC</option>
            <option>SD</option><option>TN</option><option>TX</option><option>UT</option>
            <option>VT</option><option>VA</option><option>WA</option><option>WV</option>
            <option>WI</option><option>WY</option><option>DC</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="city">Cidade <span class="optional">(opcional)</span></label>
          <input id="city" type="text" placeholder="Miami">
        </div>
        <div class="field">
          <label for="zip">ZIP Code <span class="optional">(opcional)</span></label>
          <input id="zip" type="text" placeholder="33101" maxlength="10">
        </div>
      </div>

      <div class="field">
        <label for="referral">Código de indicação <span class="optional">(opcional)</span></label>
        <input id="referral" type="text" placeholder="Ex: joao123">
      </div>

      <button type="submit" id="btn">Criar conta</button>
    </form>

    <div id="msg" class="msg"></div>
    <div class="login-link">Já tem conta? <a href="/login.html">Faça login</a></div>
  </div>

  <script>
    const API = '/api';
    const form = document.getElementById('form');
    const btn  = document.getElementById('btn');
    const msg  = document.getElementById('msg');

    // Pré-preenche código de indicação da URL (?ref=XXX)
    const ref = new URLSearchParams(location.search).get('ref');
    if (ref) document.getElementById('referral').value = ref;

    function showMsg(text, type) {
      msg.textContent = text;
      msg.className = `msg ${type}`;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Aguarde...';
      msg.className = 'msg';

      const body = {
        email:    document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
        name:     document.getElementById('name').value.trim(),
      };
      const phone    = document.getElementById('phone').value.trim();
      const state    = document.getElementById('state').value;
      const city     = document.getElementById('city').value.trim();
      const zip      = document.getElementById('zip').value.trim();
      const referral = document.getElementById('referral').value.trim();

      if (phone)    body.phone         = phone;
      if (state)    body.state         = state;
      if (city)     body.city          = city;
      if (zip)      body.zip_code      = zip;
      if (referral) body.referral_code = referral;

      try {
        const r = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await r.json();
        if (r.ok) {
          showMsg(data.message || 'Cadastro realizado! Verifique seu email.', 'success');
          form.reset();
        } else {
          const detail = Array.isArray(data.detail)
            ? data.detail.map(d => d.msg).join('; ')
            : (data.detail || 'Erro ao cadastrar');
          showMsg(detail, 'error');
        }
      } catch {
        showMsg('Erro de conexão. Tente novamente.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Criar conta';
      }
    });
  </script>
</body>
</html>
