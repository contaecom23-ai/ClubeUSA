<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
  <title>Cadastro — Clube USA</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>Clube USA 🇧🇷🇺🇸</h1>
      <p>A plataforma do imigrante brasileiro nos EUA</p>
    </div>

    <h2>Criar conta</h2>

    <form id="registerForm" novalidate>
      <div class="form-group">
        <label for="full_name">Nome completo</label>
        <input type="text" id="full_name" name="full_name"
               minlength="2" maxlength="100" required autocomplete="name"
               placeholder="Seu nome">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email"
               required autocomplete="email"
               placeholder="voce@email.com">
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password"
               minlength="8" maxlength="128" required autocomplete="new-password"
               placeholder="Mínimo 8 caracteres">
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">Criar conta</button>
    </form>

    <div id="msg" class="msg"></div>
    <div id="spinner" class="spinner">Enviando...</div>

    <div class="link-row">
      Já tem conta? <a href="login.html">Fazer login</a>
    </div>
  </div>

  <script>
    const API = window.API_URL || '';

    const form = document.getElementById('registerForm');
    const msgEl = document.getElementById('msg');
    const spinner = document.getElementById('spinner');
    const submitBtn = document.getElementById('submitBtn');

    function showMsg(text, type) {
      msgEl.textContent = text;
      msgEl.className = 'msg ' + type;
      msgEl.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msgEl.style.display = 'none';

      const full_name = document.getElementById('full_name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!full_name || !email || !password) {
        showMsg('Preencha todos os campos.', 'error');
        return;
      }
      if (password.length < 8) {
        showMsg('Senha deve ter ao menos 8 caracteres.', 'error');
        return;
      }

      submitBtn.disabled = true;
      spinner.classList.add('active');

      try {
        const res = await fetch(`${API}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ full_name, email, password }),
        });

        const data = await res.json();

        if (res.ok) {
          showMsg(
            '✅ ' + data.message + ' Verifique sua caixa de entrada (e spam).',
            'success'
          );
          form.reset();
        } else if (res.status === 429) {
          showMsg('Muitas tentativas. Aguarde um momento e tente novamente.', 'error');
        } else {
          showMsg(data.detail || 'Erro ao criar conta.', 'error');
        }
      } catch {
        showMsg('Erro de conexão. Verifique sua internet e tente novamente.', 'error');
      } finally {
        submitBtn.disabled = false;
        spinner.classList.remove('active');
      }
    });
  </script>
</body>
</html>
