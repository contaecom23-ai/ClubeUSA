<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar conta — Clube USA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col">

  <nav class="bg-white border-b border-slate-200 px-6 py-4">
    <a href="index.html" class="text-blue-800 font-bold text-xl tracking-tight">Clube USA</a>
  </nav>

  <main class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-slate-100 p-8">
      <h1 class="text-2xl font-bold text-blue-900 mb-1">Criar conta grátis</h1>
      <p class="text-sm text-slate-500 mb-6">
        Já tem conta? <a href="login.html" class="text-blue-600 hover:underline">Entrar</a>
      </p>

      <!-- Mensagem de sucesso (hidden by default) -->
      <div id="success-msg" class="hidden bg-green-50 border border-green-200 rounded-xl p-4 mb-4 text-sm text-green-800">
        <strong>Quase lá!</strong> Enviamos um link de confirmação para o seu email.
        Clique no link para ativar sua conta.
      </div>

      <!-- Mensagem de erro -->
      <div id="error-msg" class="hidden bg-red-50 border border-red-200 rounded-xl p-4 mb-4 text-sm text-red-800"></div>

      <form id="register-form" class="space-y-4" novalidate>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Nome</label>
            <input id="first_name" type="text" autocomplete="given-name"
                   placeholder="João"
                   class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Sobrenome</label>
            <input id="last_name" type="text" autocomplete="family-name"
                   placeholder="Silva"
                   class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Email *</label>
          <input id="email" type="email" autocomplete="email" required
                 placeholder="joao@email.com"
                 class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Senha *</label>
          <input id="password" type="password" autocomplete="new-password" required
                 placeholder="Mínimo 8 caracteres"
                 class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
          <p class="text-xs text-slate-400 mt-1">Mínimo 8 caracteres</p>
        </div>

        <button type="submit" id="submit-btn"
                class="w-full py-2.5 bg-blue-700 hover:bg-blue-800 text-white font-semibold rounded-lg text-sm transition disabled:opacity-50">
          Criar conta
        </button>
      </form>

      <p class="text-xs text-slate-400 mt-4 text-center">
        Ao criar uma conta você concorda com os nossos termos de uso.
      </p>
    </div>
  </main>

  <script>
    const sb = supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseAnonKey);

    // Redireciona se já logado
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'profile.html';
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email     = document.getElementById('email').value.trim();
      const password  = document.getElementById('password').value;
      const firstName = document.getElementById('first_name').value.trim();
      const lastName  = document.getElementById('last_name').value.trim();

      const errEl = document.getElementById('error-msg');
      const okEl  = document.getElementById('success-msg');
      const btn   = document.getElementById('submit-btn');

      errEl.classList.add('hidden');
      okEl.classList.add('hidden');

      if (!email || !password) {
        errEl.textContent = 'Email e senha são obrigatórios.';
        errEl.classList.remove('hidden');
        return;
      }
      if (password.length < 8) {
        errEl.textContent = 'A senha precisa ter pelo menos 8 caracteres.';
        errEl.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Criando conta…';

      const { error } = await sb.auth.signUp({
        email,
        password,
        options: {
          data: { first_name: firstName, last_name: lastName },
          emailRedirectTo: `${window.location.origin}/verify-email.html`,
        },
      });

      btn.disabled = false;
      btn.textContent = 'Criar conta';

      if (error) {
        errEl.textContent = _translateError(error.message);
        errEl.classList.remove('hidden');
      } else {
        document.getElementById('register-form').classList.add('hidden');
        okEl.classList.remove('hidden');
      }
    });

    function _translateError(msg) {
      if (msg.includes('already registered')) return 'Este email já está cadastrado. Tente fazer login.';
      if (msg.includes('invalid email'))      return 'Email inválido.';
      if (msg.includes('weak password'))      return 'Senha muito fraca. Use pelo menos 8 caracteres.';
      if (msg.includes('rate limit'))         return 'Muitas tentativas. Aguarde alguns minutos.';
      return 'Erro ao criar conta. Tente novamente.';
    }
  </script>
</body>
</html>
