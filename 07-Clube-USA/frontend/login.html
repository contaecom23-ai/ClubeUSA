<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Clube USA</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="auth-wrapper">
  <a href="/" class="logo">🇺🇸 Clube USA</a>
  <div class="card">
    <h1>Entrar na sua conta</h1>
    <p class="subtitle">Bem-vindo(a) de volta!</p>

    <div id="alert" class="alert" role="alert"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email"
               placeholder="joao@email.com" required>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" autocomplete="current-password"
               placeholder="Sua senha" required>
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">Entrar</button>
    </form>

    <div class="card-footer" style="margin-top:16px">
      Não tem conta? <a href="/register.html">Criar conta grátis</a>
    </div>
  </div>
</div>

<script src="/static/js/auth.js"></script>
<script>
  if (getToken()) window.location.href = "/dashboard.html";

  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const alert = document.getElementById("alert");
    const btn   = document.getElementById("submitBtn");

    hideAlert(alert);
    btn.disabled = true;
    btn.textContent = "Entrando…";

    try {
      const data = await apiFetch("/auth/login", {
        method: "POST",
        body: JSON.stringify({
          email:    document.getElementById("email").value.trim().toLowerCase(),
          password: document.getElementById("password").value,
        }),
      });
      setToken(data.access_token);
      setUser(data.user);
      window.location.href = "/dashboard.html";
    } catch (err) {
      let msg = "Não foi possível fazer login. Tente novamente.";
      if (err.status === 401) msg = "Email ou senha incorretos.";
      else if (err.status === 403) msg = err.message; // Unconfirmed email
      else if (err.status === 429) msg = "Muitas tentativas. Aguarde um momento.";
      showAlert(alert, msg, "error");
      btn.disabled = false;
      btn.textContent = "Entrar";
    }
  });
</script>
</body>
</html>
