<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Clube USA</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-blue-700">🇧🇷 Clube USA</h1>
      <p class="text-gray-500 mt-1">Sua comunidade brasileira nos EUA</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
      <h2 class="text-xl font-semibold text-gray-800 mb-6">Entrar</h2>

      <div id="alert" class="hidden mb-4 p-3 rounded-lg text-sm"></div>

      <form id="loginForm" novalidate>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1" for="email">Email</label>
          <input id="email" type="email" autocomplete="email" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="joao@email.com">
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Senha</label>
          <input id="password" type="password" autocomplete="current-password" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <button type="submit" id="submitBtn"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition-colors text-sm">
          Entrar
        </button>
      </form>

      <div id="resendSection" class="hidden mt-4 p-3 bg-yellow-50 border border-yellow-200 rounded-lg text-sm text-yellow-800">
        <p class="font-medium mb-2">Email não confirmado?</p>
        <input id="resendEmail" type="email"
          class="w-full border border-yellow-300 rounded px-2 py-1 text-sm mb-2 focus:outline-none focus:ring-1 focus:ring-yellow-500"
          placeholder="Seu email">
        <button id="resendBtn"
          class="text-blue-600 hover:underline text-sm">Reenviar email de confirmação</button>
      </div>

      <p class="text-center text-sm text-gray-500 mt-4">
        Não tem conta? <a href="register.html" class="text-blue-600 hover:underline">Cadastre-se grátis</a>
      </p>
    </div>
  </div>

  <script>
    const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:8000'
      : '';

    const alertEl = document.getElementById('alert');

    function showAlert(msg, type = 'error') {
      alertEl.className = `mb-4 p-3 rounded-lg text-sm ${type === 'error' ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-green-50 text-green-700 border border-green-200'}`;
      alertEl.textContent = msg;
      alertEl.classList.remove('hidden');
    }

    // Mostrar mensagem de confirmação se veio do link de confirmação
    const params = new URLSearchParams(window.location.search);
    if (params.get('confirmed') === '1') {
      showAlert('✅ Email confirmado! Faça login para continuar.', 'success');
    } else if (params.get('confirm_error') === 'expired') {
      showAlert('Link expirado. Solicite um novo email de confirmação abaixo.');
      document.getElementById('resendSection').classList.remove('hidden');
    } else if (params.get('confirm_error') === 'invalid') {
      showAlert('Link inválido. Se o problema persistir, solicite um novo email de confirmação abaixo.');
      document.getElementById('resendSection').classList.remove('hidden');
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.classList.add('hidden');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const submitBtn = document.getElementById('submitBtn');

      submitBtn.disabled = true;
      submitBtn.textContent = 'Entrando...';

      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('clubeusa_token', data.access_token);
          window.location.href = 'profile.html';
        } else if (res.status === 403) {
          showAlert('Email não confirmado. Verifique sua caixa de entrada ou reenvie abaixo.');
          document.getElementById('resendEmail').value = email;
          document.getElementById('resendSection').classList.remove('hidden');
        } else {
          showAlert(data.detail || 'Email ou senha incorretos.');
        }
      } catch {
        showAlert('Erro de conexão. Tente novamente.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Entrar';
      }
    });

    document.getElementById('resendBtn').addEventListener('click', async () => {
      const email = document.getElementById('resendEmail').value.trim();
      if (!email) { showAlert('Digite seu email para reenviar.'); return; }

      const btn = document.getElementById('resendBtn');
      btn.textContent = 'Enviando...';
      btn.disabled = true;

      try {
        await fetch(`${API_BASE}/auth/resend-confirmation`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        showAlert('✅ Se este email estiver cadastrado, você receberá um novo link em breve.', 'success');
      } catch {
        showAlert('Erro ao reenviar. Tente novamente.');
      } finally {
        btn.textContent = 'Reenviar email de confirmação';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
