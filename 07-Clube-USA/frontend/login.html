<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Clube USA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #1a56db; --blue-dark: #1241b0; --text: #111928;
      --muted: #6b7280; --border: #d1d5db; --bg: #f9fafb;
      --error: #dc2626; --success: #057a55; --radius: 8px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: var(--bg); color: var(--text); min-height: 100vh;
           display: flex; flex-direction: column; }
    a { color: var(--blue); }

    header { padding: 16px 24px; border-bottom: 1px solid var(--border); background: #fff; }
    .logo { font-size: 1.3rem; font-weight: 700; color: var(--blue); text-decoration: none; }
    .logo span { color: #057a55; }

    main { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px; }
    .card { background: #fff; border: 1px solid var(--border); border-radius: 12px;
            padding: 36px 32px; width: 100%; max-width: 440px; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: var(--muted); font-size: 0.95rem; margin-bottom: 28px; }

    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 6px; }
    input { width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius);
            padding: 10px 14px; font-size: 1rem; outline: none; transition: border-color .15s; }
    input:focus { border-color: var(--blue); }

    .btn { width: 100%; padding: 12px; background: var(--blue); color: #fff; border: none;
           border-radius: var(--radius); font-size: 1rem; font-weight: 700; cursor: pointer;
           transition: background .15s; margin-top: 8px; }
    .btn:hover { background: var(--blue-dark); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .alert { border-radius: var(--radius); padding: 12px 16px; font-size: 0.9rem;
             margin-bottom: 20px; display: none; }
    .alert.error { background: #fef2f2; border: 1px solid #fecaca; color: var(--error); }
    .alert.info { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }

    .links { display: flex; justify-content: space-between; font-size: 0.88rem; margin-top: 18px; }
    footer { text-align: center; padding: 16px; color: var(--muted); font-size: 0.82rem; }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo">Clube<span>USA</span></a>
  </header>

  <main>
    <div class="card">
      <h1>Entrar</h1>
      <p class="subtitle">Bem-vindo de volta!</p>

      <div id="alert" class="alert" role="alert"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required
                 autocomplete="email" placeholder="maria@email.com" />
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" required
                 autocomplete="current-password" />
        </div>

        <button type="submit" class="btn" id="submitBtn">Entrar</button>
      </form>

      <div class="links">
        <a href="register.html">Criar conta grátis</a>
        <a href="#" id="resendLink">Reenviar confirmação</a>
      </div>
    </div>
  </main>

  <footer>© 2025 Clube USA</footer>

  <script>
    const API_URL = 'http://localhost:8000/api/v1';

    const form = document.getElementById('loginForm');
    const alertEl = document.getElementById('alert');
    const submitBtn = document.getElementById('submitBtn');

    function showAlert(msg, type) {
      alertEl.textContent = msg;
      alertEl.className = `alert ${type}`;
      alertEl.style.display = 'block';
    }

    // If already logged in, go to dashboard
    if (localStorage.getItem('access_token')) {
      window.location.href = 'dashboard.html';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.style.display = 'none';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showAlert('Preencha email e senha.', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Entrando...';

      try {
        const resp = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await resp.json();

        if (resp.ok) {
          localStorage.setItem('access_token', data.access_token);
          localStorage.setItem('user_id', data.user_id);
          window.location.href = 'dashboard.html';
        } else if (resp.status === 403) {
          showAlert(data.detail + ' Não recebeu o email? Clique em "Reenviar confirmação".', 'info');
        } else {
          showAlert(data.detail || 'Email ou senha incorretos.', 'error');
        }
      } catch (_) {
        showAlert('Erro de conexão. Verifique sua internet.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Entrar';
      }
    });

    document.getElementById('resendLink').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) {
        showAlert('Digite seu email acima para reenviar o link de confirmação.', 'info');
        return;
      }
      try {
        await fetch(`${API_URL}/auth/resend-verification`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        showAlert('Se o email estiver cadastrado e não confirmado, você receberá um novo link.', 'info');
      } catch (_) {
        showAlert('Erro de conexão.', 'error');
      }
    });
  </script>
</body>
</html>
