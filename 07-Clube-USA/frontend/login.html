<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Clube USA</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header class="site-header">
  <a href="index.html" class="logo">🇧🇷 Clube USA</a>
  <nav><a href="register.html">Criar conta</a></nav>
</header>

<div class="container" style="padding-top:32px;">
  <div class="card">
    <h1>Entrar</h1>
    <p class="subtitle">Bem-vindo de volta!</p>

    <div id="alert" class="alert alert-danger"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="voce@email.com" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="Sua senha" autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn" data-label="Entrar">
        Entrar
      </button>
    </form>

    <p class="page-footer" style="margin-top:20px;">
      Não tem conta? <a href="register.html">Cadastre-se grátis</a>
    </p>
  </div>
</div>

<script src="assets/app.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = "profile.html";

  const form    = document.getElementById("loginForm");
  const alertEl = document.getElementById("alert");
  const submitBtn = document.getElementById("submitBtn");

  form.addEventListener("submit", async e => {
    e.preventDefault();
    hideAlert(alertEl);

    const payload = {
      email:    document.getElementById("email").value.trim(),
      password: document.getElementById("password").value,
    };

    if (!payload.email || !payload.password) {
      showAlert(alertEl, "Preencha email e senha.");
      return;
    }

    setLoading(submitBtn, true);

    try {
      const result = await apiRequest("/auth/login", { method: "POST", body: payload });

      if (!result) return;

      if (result.ok) {
        Auth.save(result.data);
        window.location.href = "profile.html";
      } else {
        showAlert(alertEl, result.data?.detail || "Email ou senha incorretos.");
      }
    } catch {
      showAlert(alertEl, "Erro de conexão. Verifique sua internet.");
    } finally {
      setLoading(submitBtn, false);
    }
  });
</script>
</body>
</html>
