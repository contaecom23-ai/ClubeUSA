<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Clube USA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4ff;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      padding: 36px 32px;
      width: 100%;
      max-width: 400px;
    }
    .logo { color: #1a56db; font-size: 1.2rem; font-weight: 700; margin-bottom: 24px; display: block; }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; }
    .subtitle { font-size: 0.9rem; color: #666; margin-bottom: 28px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; color: #333; }
    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      margin-bottom: 16px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: #1a56db; box-shadow: 0 0 0 3px rgba(26,86,219,.12); }
    .btn {
      width: 100%;
      padding: 13px;
      background: #1a56db;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .msg.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; display: block; }
    .msg.error   { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; display: block; }
    .footer-link { text-align: center; margin-top: 20px; font-size: 0.88rem; color: #666; }
    .footer-link a { color: #1a56db; text-decoration: none; font-weight: 600; }
    .footer-link a:hover { text-decoration: underline; }
    .warn-banner {
      background: #fffbeb;
      border: 1px solid #fcd34d;
      color: #92400e;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <a href="index.html" class="logo">🇧🇷 Clube USA</a>
    <h1>Entrar</h1>
    <p class="subtitle">Bem-vindo de volta!</p>

    <div id="email-warning" class="warn-banner">
      ⚠️ Seu email ainda não foi confirmado. Verifique sua caixa de entrada.
    </div>

    <form id="form" novalidate>
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="maria@email.com" required />

      <label for="password">Senha</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required />

      <button type="submit" class="btn" id="submit-btn">Entrar</button>
    </form>

    <div id="msg" class="msg"></div>
    <p class="footer-link">Não tem conta? <a href="register.html">Criar conta grátis</a></p>
  </div>

  <script>
    const API = 'http://localhost:8000';
    const form = document.getElementById('form');
    const btn  = document.getElementById('submit-btn');
    const msg  = document.getElementById('msg');

    function showMsg(text, type) {
      msg.textContent = text;
      msg.className = 'msg ' + type;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Entrando…';
      msg.className = 'msg';

      const body = {
        email:    document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      };

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('clubeusa_token', data.access_token);
          localStorage.setItem('clubeusa_user', JSON.stringify({
            id: data.user_id,
            email: data.email,
            full_name: data.full_name,
            email_confirmed: data.email_confirmed,
          }));

          if (!data.email_confirmed) {
            document.getElementById('email-warning').style.display = 'block';
          }

          showMsg('✅ Login realizado! Redirecionando…', 'success');
          setTimeout(() => { window.location.href = 'index.html'; }, 1200);
        } else {
          showMsg('⚠️ ' + (data.detail || 'Erro desconhecido'), 'error');
        }
      } catch (err) {
        showMsg('Erro de conexão. Verifique se o servidor está rodando.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
