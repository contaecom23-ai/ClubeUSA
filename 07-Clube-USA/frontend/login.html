<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Clube USA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.08); padding: 2.5rem; width: 100%; max-width: 420px; }
    .logo { font-size: 1.5rem; font-weight: 700; color: #1d4ed8; margin-bottom: 0.25rem; }
    .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 1.75rem; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #374151; margin-bottom: 0.35rem; }
    input { width: 100%; padding: 0.65rem 0.85rem; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 0.95rem; outline: none; transition: border-color .15s; }
    input:focus { border-color: #1d4ed8; }
    .field { margin-bottom: 1.1rem; }
    .btn { width: 100%; padding: 0.75rem; background: #1d4ed8; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; transition: background .15s; }
    .btn:hover { background: #1e40af; }
    .btn:disabled { background: #93c5fd; cursor: not-allowed; }
    .msg { padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.875rem; margin-top: 1rem; display: none; }
    .msg.success { background: #dcfce7; color: #166534; }
    .msg.error   { background: #fee2e2; color: #991b1b; }
    .link { text-align: center; margin-top: 1.25rem; font-size: 0.875rem; color: #64748b; }
    .link a { color: #1d4ed8; text-decoration: none; font-weight: 600; }
    .forgot { text-align: right; font-size: 0.8rem; margin-top: 0.25rem; }
    .forgot a { color: #6b7280; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🇺🇸 Clube USA</div>
    <p class="subtitle">Entrar na sua conta</p>

    <form id="form">
      <div class="field">
        <label for="email">E-mail</label>
        <input id="email" type="email" required autocomplete="email" placeholder="voce@email.com">
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <input id="password" type="password" required autocomplete="current-password" placeholder="••••••••">
        <p class="forgot"><a href="#" id="forgotLink">Esqueceu a senha?</a></p>
      </div>
      <button type="submit" class="btn" id="btn">Entrar</button>
    </form>

    <div class="msg" id="msg"></div>
    <p class="link">Não tem conta? <a href="register.html">Cadastre-se grátis</a></p>
  </div>

  <script>
    const API = (window.API_URL || 'http://localhost:8000');
    const form = document.getElementById('form');
    const btn  = document.getElementById('btn');
    const msg  = document.getElementById('msg');

    function showMsg(text, type) {
      msg.textContent = text;
      msg.className = 'msg ' + type;
      msg.style.display = 'block';
    }

    document.getElementById('forgotLink').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) { showMsg('Digite seu e-mail primeiro.', 'error'); return; }
      try {
        await fetch(`${API}/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        showMsg('Se o e-mail existir, um link de redefinição foi enviado.', 'success');
      } catch { showMsg('Falha de conexão.', 'error'); }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Entrando...';
      msg.style.display = 'none';

      try {
        const resp = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        const data = await resp.json();

        if (resp.ok) {
          localStorage.setItem('access_token', data.access_token);
          localStorage.setItem('refresh_token', data.refresh_token);
          showMsg('✅ Login realizado! Redirecionando...', 'success');
          setTimeout(() => { window.location.href = 'profile.html'; }, 1000);
        } else {
          showMsg('❌ ' + (data.detail || 'Erro desconhecido.'), 'error');
        }
      } catch {
        showMsg('❌ Falha de conexão. Tente novamente.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
