<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmando email — Clube USA</title>
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
  <div class="page-center">
    <div class="card" style="text-align:center;">
      <div class="brand">
        <h1>🇧🇷 Clube USA</h1>
      </div>

      <div id="status" style="font-size:1.5rem; margin: 24px 0;">⏳ Confirmando seu email…</div>
      <div id="alert" class="alert"></div>
      <div id="action" style="display:none;" class="mt-4">
        <a href="login.html" class="btn btn-primary">Fazer login →</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { API } from './static/js/api.js';

    const statusEl = document.getElementById('status');
    const alertEl = document.getElementById('alert');
    const actionEl = document.getElementById('action');

    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    function showResult(ok, msg) {
      statusEl.textContent = ok ? '✅' : '❌';
      alertEl.textContent = msg;
      alertEl.className = `alert alert-${ok ? 'success' : 'error'} show`;
      if (ok) actionEl.style.display = 'block';
    }

    if (!token) {
      showResult(false, 'Link inválido. Verifique seu email e tente novamente.');
    } else {
      API.confirmEmail(token)
        .then(() => showResult(true, 'Email confirmado com sucesso! Você já pode fazer login.'))
        .catch(err => showResult(false, err.message || 'Erro ao confirmar email.'));
    }
  </script>
</body>
</html>
