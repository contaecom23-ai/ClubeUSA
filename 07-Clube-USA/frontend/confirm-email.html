<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmando E-mail — Clube USA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.1);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.4rem; color: #222; margin-bottom: .5rem; }
    p { color: #555; font-size: .95rem; line-height: 1.5; margin-bottom: 1.5rem; }
    .btn {
      display: inline-block;
      padding: .75rem 2rem;
      background: #1a73e8;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
    }
    .btn:hover { background: #1557b0; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon">⏳</div>
    <h1>Confirmando seu e-mail…</h1>
    <p>Aguarde um instante.</p>
  </div>

  <script>
    const API = (window.CLUBE_USA_API_URL || 'http://localhost:8000');

    async function confirm() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const card = document.getElementById('card');

      if (!token) {
        card.innerHTML = `
          <div class="icon">❌</div>
          <h1>Link inválido</h1>
          <p>Este link de confirmação é inválido ou está incompleto.</p>
          <a href="register.html" class="btn">Criar nova conta</a>`;
        return;
      }

      try {
        const res = await fetch(`${API}/auth/confirm-email/${encodeURIComponent(token)}`);
        const data = await res.json();

        if (res.ok) {
          card.innerHTML = `
            <div class="icon">✅</div>
            <h1>E-mail confirmado!</h1>
            <p>${data.message}</p>
            <a href="login.html" class="btn">Fazer login</a>`;
        } else {
          const detail = data.detail || 'Erro ao confirmar.';
          const expired = detail.toLowerCase().includes('expirado');
          card.innerHTML = `
            <div class="icon">⚠️</div>
            <h1>${expired ? 'Link expirado' : 'Link inválido'}</h1>
            <p>${detail}</p>
            <a href="login.html" class="btn">Ir para login</a>`;
        }
      } catch {
        card.innerHTML = `
          <div class="icon">❌</div>
          <h1>Erro de conexão</h1>
          <p>Não foi possível confirmar seu e-mail. Tente novamente mais tarde.</p>
          <a href="login.html" class="btn">Ir para login</a>`;
      }
    }

    confirm();
  </script>
</body>
</html>
