<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clube USA — Cadastro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      background: #1a56db;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.5px; }
    header a { color: #c7d8ff; text-decoration: none; font-size: 0.9rem; }
    header a:hover { color: #fff; }

    .hero {
      text-align: center;
      padding: 48px 24px 32px;
      max-width: 560px;
    }
    .hero h2 { font-size: 1.8rem; color: #111827; margin-bottom: 12px; line-height: 1.3; }
    .hero p  { color: #6b7280; font-size: 1rem; line-height: 1.6; }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 32px;
      width: 100%;
      max-width: 440px;
      margin: 0 16px 48px;
    }
    .card h3 { font-size: 1.1rem; margin-bottom: 20px; color: #111827; }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #111827;
      transition: border-color 0.15s;
      outline: none;
    }
    input:focus { border-color: #1a56db; box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }
    input.error { border-color: #ef4444; }

    .hint { font-size: 0.78rem; color: #9ca3af; margin-top: 4px; }
    .field-error { font-size: 0.8rem; color: #ef4444; margin-top: 4px; display: none; }

    .btn {
      width: 100%;
      padding: 12px;
      background: #1a56db;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
    }
    .btn:hover:not(:disabled) { background: #1447c0; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }
    .alert.success { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
    .alert.error   { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }

    .footer-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: #6b7280;
    }
    .footer-link a { color: #1a56db; text-decoration: none; font-weight: 600; }
    .footer-link a:hover { text-decoration: underline; }

    .password-strength {
      height: 4px;
      border-radius: 2px;
      background: #e5e7eb;
      margin-top: 6px;
      overflow: hidden;
    }
    .password-strength-bar {
      height: 100%;
      border-radius: 2px;
      width: 0;
      transition: width 0.3s, background 0.3s;
    }
  </style>
</head>
<body>
  <header>
    <h1>🇧🇷 Clube USA</h1>
    <a href="/login">Entrar →</a>
  </header>

  <div class="hero">
    <h2>A plataforma do imigrante brasileiro nos EUA</h2>
    <p>Promoções, empregos, moradia, comunidade — tudo em um só lugar.</p>
  </div>

  <div class="card">
    <h3>Criar conta gratuita</h3>

    <div class="alert success" id="alert-success"></div>
    <div class="alert error" id="alert-error"></div>

    <form id="register-form" novalidate>
      <div class="form-group">
        <label for="full_name">Nome completo</label>
        <input type="text" id="full_name" name="full_name" placeholder="João da Silva" autocomplete="name">
        <div class="field-error" id="err-name"></div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="joao@email.com" autocomplete="email">
        <div class="field-error" id="err-email"></div>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
        <div class="password-strength"><div class="password-strength-bar" id="pwd-bar"></div></div>
        <div class="hint">Deve conter letras e números</div>
        <div class="field-error" id="err-password"></div>
      </div>

      <div class="form-group">
        <label for="zip_code">ZIP Code <span style="font-weight:400;color:#9ca3af">(opcional)</span></label>
        <input type="text" id="zip_code" name="zip_code" placeholder="10001" maxlength="10" autocomplete="postal-code">
        <div class="field-error" id="err-zip"></div>
      </div>

      <button class="btn" type="submit" id="submit-btn">Criar conta</button>
    </form>

    <div class="footer-link">
      Já tem conta? <a href="/login">Entrar</a>
    </div>
  </div>

  <script>
    const API = '/api/auth';

    // Força ZIP para uppercase/números
    document.getElementById('zip_code').addEventListener('input', e => {
      e.target.value = e.target.value.replace(/[^0-9-]/g, '');
    });

    // Indicador de força de senha
    document.getElementById('password').addEventListener('input', e => {
      const v = e.target.value;
      const bar = document.getElementById('pwd-bar');
      let strength = 0;
      if (v.length >= 8) strength++;
      if (/[A-Za-z]/.test(v)) strength++;
      if (/\d/.test(v)) strength++;
      if (v.length >= 12 && /[^A-Za-z0-9]/.test(v)) strength++;
      const colors = ['', '#ef4444', '#f59e0b', '#22c55e', '#16a34a'];
      const widths = ['0%', '25%', '50%', '75%', '100%'];
      bar.style.width  = widths[strength];
      bar.style.background = colors[strength];
    });

    function showAlert(type, msg) {
      const el = document.getElementById(`alert-${type}`);
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById(`alert-${type === 'success' ? 'error' : 'success'}`).style.display = 'none';
    }

    function clearErrors() {
      ['name','email','password','zip'].forEach(f => {
        const el = document.getElementById(`err-${f}`);
        if (el) el.style.display = 'none';
      });
      ['full_name','email','password','zip_code'].forEach(f => {
        const el = document.getElementById(f);
        if (el) el.classList.remove('error');
      });
    }

    function showFieldError(field, msg) {
      const input = document.getElementById(field);
      const err   = document.getElementById(`err-${field === 'full_name' ? 'name' : field === 'zip_code' ? 'zip' : field}`);
      if (input) input.classList.add('error');
      if (err) { err.textContent = msg; err.style.display = 'block'; }
    }

    document.getElementById('register-form').addEventListener('submit', async e => {
      e.preventDefault();
      clearErrors();

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Criando conta...';

      const body = {
        full_name: document.getElementById('full_name').value.trim(),
        email:     document.getElementById('email').value.trim(),
        password:  document.getElementById('password').value,
        zip_code:  document.getElementById('zip_code').value.trim() || undefined,
      };

      if (!body.zip_code) delete body.zip_code;

      try {
        const res = await fetch(`${API}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await res.json();

        if (res.ok) {
          showAlert('success', data.message);
          document.getElementById('register-form').reset();
          document.getElementById('pwd-bar').style.width = '0';
        } else if (res.status === 422 && data.detail) {
          // Erros de validação do Pydantic
          const errors = Array.isArray(data.detail) ? data.detail : [];
          errors.forEach(err => {
            const field = err.loc ? err.loc[err.loc.length - 1] : null;
            if (field) showFieldError(field, err.msg);
          });
          if (!errors.length) showAlert('error', data.detail || 'Dados inválidos.');
        } else if (res.status === 429) {
          showAlert('error', 'Muitas tentativas. Aguarde alguns minutos.');
        } else {
          showAlert('error', data.detail || 'Erro inesperado. Tente novamente.');
        }
      } catch {
        showAlert('error', 'Erro de conexão. Verifique sua internet e tente novamente.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Criar conta';
      }
    });
  </script>
</body>
</html>
