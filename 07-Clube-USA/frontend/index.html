<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clube USA — Para Brasileiros nos EUA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a; color: #f1f5f9;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 2rem;
    }
    .hero { text-align: center; max-width: 560px; }
    .logo { font-size: 2.8rem; font-weight: 800; color: #38bdf8; margin-bottom: 0.5rem; }
    .tagline { font-size: 1.15rem; color: #94a3b8; margin-bottom: 2.5rem; line-height: 1.6; }
    .btn {
      display: inline-block; padding: 0.85rem 2rem; border-radius: 8px;
      font-size: 1rem; font-weight: 600; text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #38bdf8; color: #0f172a; }
    .btn-secondary { background: transparent; color: #38bdf8; border: 2px solid #38bdf8; margin-left: 1rem; }
    .actions { display: flex; justify-content: center; flex-wrap: wrap; gap: 1rem; }
    footer { position: fixed; bottom: 1rem; color: #475569; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="hero">
    <div class="logo">🇧🇷 Clube USA</div>
    <p class="tagline">
      A plataforma que transforma a vida cotidiana do imigrante brasileiro nos EUA
      em um sistema organizado de decisões, serviços e oportunidades.
    </p>
    <div class="actions">
      <a href="register.html" class="btn btn-primary">Criar conta grátis</a>
      <a href="login.html" class="btn btn-secondary">Entrar</a>
    </div>
  </div>
  <footer>Clube USA &copy; 2026</footer>

</body>
</html>
