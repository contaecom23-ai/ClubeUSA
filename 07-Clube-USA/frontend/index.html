<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clube USA — A comunidade brasileira nos EUA</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    .hero {
      text-align: center;
      padding: 80px 24px 60px;
    }
    .hero h2 {
      font-size: clamp(28px, 5vw, 48px);
      color: var(--blue);
      margin: 0 0 16px;
      font-weight: 700;
    }
    .hero p {
      font-size: 18px;
      color: var(--gray-500);
      max-width: 560px;
      margin: 0 auto 40px;
      line-height: 1.6;
    }
    .hero-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .hero-actions a {
      padding: 13px 28px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
    }
    .btn-hero-primary { background: var(--blue); color: #fff; }
    .btn-hero-primary:hover { background: var(--blue-dark); }
    .btn-hero-secondary { background: var(--gray-100); color: var(--gray-700); }
    .btn-hero-secondary:hover { background: var(--gray-200); }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-brand">Clube USA</a>
    <div class="nav-links" id="nav-links">
      <a href="login.html">Entrar</a>
      <a href="register.html">Cadastrar</a>
    </div>
  </nav>

  <div class="hero">
    <h2>Sua vida nos EUA,<br>mais organizada</h2>
    <p>
      A plataforma para imigrantes brasileiros encontrarem empregos,
      moradia, promocoes e oportunidades — tudo em um lugar so.
    </p>
    <div class="hero-actions">
      <a href="register.html" class="btn-hero-primary">Criar conta gratis</a>
      <a href="login.html" class="btn-hero-secondary">Ja tenho conta</a>
    </div>
  </div>

  <script src="assets/js/auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (localStorage.getItem("access_token")) {
        document.getElementById("nav-links").innerHTML =
          '<a href="profile.html">Meu perfil</a>' +
          '<button onclick="logout()">Sair</button>';
      }
    });
  </script>
</body>
</html>
