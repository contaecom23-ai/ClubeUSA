<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clube USA — Promoções e Achados para Brasileiros nos EUA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f0f4ff; min-height: 100vh; }

    /* Header */
    header { background: white; border-bottom: 1px solid #e8eaf0; position: sticky; top: 0; z-index: 10; }
    .header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; }
    .logo { color: #1a56db; font-size: 1.25rem; font-weight: 700; text-decoration: none; }
    .logo span { color: #555; font-weight: 400; font-size: .9rem; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .btn-ghost { padding: 7px 14px; border: 1px solid #ddd; border-radius: 8px; background: none; cursor: pointer; color: #333; font-size: .85rem; text-decoration: none; display: inline-block; transition: border-color .2s, color .2s; }
    .btn-ghost:hover { border-color: #1a56db; color: #1a56db; }
    .btn-primary { padding: 7px 14px; background: #1a56db; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: .85rem; font-weight: 600; text-decoration: none; display: inline-block; transition: background .2s; }
    .btn-primary:hover { background: #1648c4; }

    /* Hero */
    .hero { background: linear-gradient(135deg, #1a56db 0%, #2563eb 100%); color: white; text-align: center; padding: 44px 16px 36px; }
    .hero h1 { font-size: clamp(1.5rem, 4vw, 2.2rem); margin-bottom: 10px; }
    .hero p { font-size: .95rem; opacity: .9; max-width: 500px; margin: 0 auto; }

    /* Tabs */
    .tabs-wrap { background: white; border-bottom: 1px solid #e8eaf0; overflow-x: auto; scrollbar-width: none; }
    .tabs-wrap::-webkit-scrollbar { height: 0; }
    .tabs { display: flex; max-width: 1100px; margin: 0 auto; padding: 0 8px; }
    .tab { padding: 13px 16px; cursor: pointer; font-size: .85rem; font-weight: 500; color: #666; border: none; border-bottom: 3px solid transparent; background: none; white-space: nowrap; transition: color .15s, border-color .15s; }
    .tab:hover { color: #1a56db; }
    .tab.active { color: #1a56db; border-bottom-color: #1a56db; }

    /* Content */
    .content { max-width: 1100px; margin: 0 auto; padding: 20px 16px 40px; }
    #status-bar { font-size: .85rem; color: #999; margin-bottom: 14px; min-height: 18px; }

    /* Grid */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 16px; }

    /* Card */
    .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 10px rgba(0,0,0,.07); display: flex; flex-direction: column; transition: transform .15s, box-shadow .15s; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.1); }
    .card-img { width: 100%; height: 150px; background: #e8eaf0; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; flex-shrink: 0; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; }
    .card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .card-badges { display: flex; gap: 5px; flex-wrap: wrap; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; }
    .badge-cat { background: #e0e8ff; color: #1a56db; }
    .badge-featured { background: #fff8e1; color: #d97706; }
    .badge-urgent { background: #fdecea; color: #c62828; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.65} }
    .card-title { font-size: .97rem; font-weight: 600; color: #1a1a2e; line-height: 1.35; }
    .card-desc { font-size: .83rem; color: #666; line-height: 1.5; flex: 1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
    .card-expires { font-size: .76rem; color: #aaa; }
    .card-link { padding: 7px 14px; background: #1a56db; color: white; border: none; border-radius: 7px; text-decoration: none; font-size: .83rem; font-weight: 600; cursor: pointer; transition: background .2s; white-space: nowrap; }
    .card-link:hover { background: #1648c4; }

    /* Empty / loading */
    .placeholder { text-align: center; padding: 56px 16px; color: #999; }
    .placeholder .icon { font-size: 3rem; margin-bottom: 14px; }
    .placeholder h3 { font-size: 1.05rem; color: #555; margin-bottom: 6px; }
    .spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid #e0e8ff; border-top-color: #1a56db; border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { text-align: center; padding: 28px 16px; color: #bbb; font-size: .8rem; }
    footer a { color: #1a56db; text-decoration: none; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="/">Clube USA <span>— Achados para brasileiros</span></a>
    <div class="header-actions" id="header-actions">
      <a class="btn-ghost" href="/login.html">Entrar</a>
      <a class="btn-primary" href="/register.html">Cadastrar</a>
    </div>
  </div>
</header>

<section class="hero">
  <h1>🇧🇷 Economize em cada compra</h1>
  <p>Promoções e achados curados para a comunidade brasileira nos Estados Unidos.</p>
</section>

<div class="tabs-wrap">
  <div class="tabs" id="tabs">
    <button class="tab active" data-cat="">Tudo</button>
    <button class="tab" data-cat="supermercado">🛒 Supermercado</button>
    <button class="tab" data-cat="restaurante">🍽️ Restaurante</button>
    <button class="tab" data-cat="roupa">👕 Roupa</button>
    <button class="tab" data-cat="eletronica">📱 Eletrônica</button>
    <button class="tab" data-cat="servicos">🔧 Serviços</button>
    <button class="tab" data-cat="saude">💊 Saúde</button>
    <button class="tab" data-cat="educacao">📚 Educação</button>
    <button class="tab" data-cat="transporte">🚗 Transporte</button>
    <button class="tab" data-cat="outros">✨ Outros</button>
  </div>
</div>

<div class="content">
  <div id="status-bar"></div>
  <div id="grid-container">
    <div class="placeholder">
      <div class="spinner"></div>
      <p>Carregando promoções...</p>
    </div>
  </div>
</div>

<footer>
  Clube USA &copy; 2026 — <a href="/login.html">Entrar</a> · <a href="/register.html">Criar conta grátis</a>
</footer>

<script>
  const API = '/api';
  let allItems = [];
  let activeCategory = '';

  // Atualiza header se usuário estiver logado
  (function initHeader() {
    const token = localStorage.getItem('access_token');
    if (!token) return;
    document.getElementById('header-actions').innerHTML = `
      <a class="btn-ghost" href="/profile.html">Meu Perfil</a>
      <button class="btn-ghost" id="logout-btn">Sair</button>
    `;
    document.getElementById('logout-btn').addEventListener('click', async () => {
      const rt = localStorage.getItem('refresh_token');
      if (rt) {
        try {
          await fetch(`${API}/auth/logout`, {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({refresh_token: rt}),
          });
        } catch {}
      }
      localStorage.removeItem('access_token');
      localStorage.removeItem('refresh_token');
      location.reload();
    });
  })();

  // Filtro por categoria via tabs
  document.getElementById('tabs').addEventListener('click', (e) => {
    const tab = e.target.closest('[data-cat]');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeCategory = tab.dataset.cat;
    renderGrid();
  });

  const CAT_LABELS = {
    supermercado:'🛒 Supermercado', restaurante:'🍽️ Restaurante', roupa:'👕 Roupa',
    eletronica:'📱 Eletrônica', servicos:'🔧 Serviços', saude:'💊 Saúde',
    educacao:'📚 Educação', transporte:'🚗 Transporte', outros:'✨ Outros',
  };
  const CAT_EMOJI = {
    supermercado:'🛒', restaurante:'🍽️', roupa:'👕', eletronica:'📱',
    servicos:'🔧', saude:'💊', educacao:'📚', transporte:'🚗', outros:'✨',
  };

  function escHtml(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatExpiry(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const diffMs = d - Date.now();
    if (diffMs < 0) return '';
    if (diffMs < 86400000) return 'Expira hoje!';
    const days = Math.ceil(diffMs / 86400000);
    if (days <= 7) return `Expira em ${days}d`;
    return `Até ${d.toLocaleDateString('pt-BR', {day:'2-digit', month:'short'})}`;
  }

  function renderCard(p) {
    const imgHtml = p.image_url
      ? `<div class="card-img"><img src="${escHtml(p.image_url)}" alt="${escHtml(p.title)}" loading="lazy"></div>`
      : `<div class="card-img">${CAT_EMOJI[p.category] || '🎯'}</div>`;
    const expiry = formatExpiry(p.expires_at);
    return `
      <div class="card">
        ${imgHtml}
        <div class="card-body">
          <div class="card-badges">
            <span class="badge badge-cat">${escHtml(CAT_LABELS[p.category] || p.category)}</span>
            ${p.is_featured ? '<span class="badge badge-featured">⭐ Destaque</span>' : ''}
            ${p.is_urgent   ? '<span class="badge badge-urgent">🔥 Urgente</span>' : ''}
          </div>
          <div class="card-title">${escHtml(p.title)}</div>
          <div class="card-desc">${escHtml(p.description)}</div>
          <div class="card-footer">
            <span class="card-expires">${escHtml(expiry)}</span>
            <a class="card-link" href="${escHtml(p.url)}" target="_blank" rel="noopener noreferrer"
               onclick="registerClick(${JSON.stringify(escHtml(p.id))})">Ver oferta</a>
          </div>
        </div>
      </div>`;
  }

  function renderGrid() {
    const filtered = activeCategory
      ? allItems.filter(p => p.category === activeCategory)
      : allItems;
    const status = document.getElementById('status-bar');
    const container = document.getElementById('grid-container');
    if (filtered.length === 0) {
      status.textContent = '';
      container.innerHTML = `
        <div class="placeholder">
          <div class="icon">🔍</div>
          <h3>Nenhuma promoção nesta categoria</h3>
          <p>Tente outra categoria ou volte em breve!</p>
        </div>`;
      return;
    }
    const n = filtered.length;
    status.textContent = `${n} promoç${n !== 1 ? 'ões' : 'ão'} encontrada${n !== 1 ? 's' : ''}`;
    container.innerHTML = `<div class="grid">${filtered.map(renderCard).join('')}</div>`;
  }

  function registerClick(promotionId) {
    fetch(`${API}/promotions/${encodeURIComponent(promotionId)}/click`, {method:'POST'}).catch(()=>{});
  }

  (async function loadPromotions() {
    try {
      const r = await fetch(`${API}/promotions`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      allItems = data.items || [];
      renderGrid();
    } catch {
      document.getElementById('grid-container').innerHTML = `
        <div class="placeholder">
          <div class="icon">⚠️</div>
          <h3>Erro ao carregar promoções</h3>
          <p>Verifique sua conexão e recarregue a página.</p>
        </div>`;
    }
  })();
</script>
</body>
</html>
