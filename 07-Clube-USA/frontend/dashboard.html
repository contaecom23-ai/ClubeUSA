<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel — Clube USA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #1a56db; --blue-dark: #1241b0; --text: #111928; --muted: #6b7280;
      --border: #e5e7eb; --bg: #f9fafb; --success: #057a55;
      --error: #dc2626; --radius: 8px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: var(--bg); color: var(--text); min-height: 100vh; }
    a { color: var(--blue); text-decoration: none; }

    /* Header */
    header { background: #fff; border-bottom: 1px solid var(--border);
             padding: 0 24px; display: flex; align-items: center; height: 56px; gap: 16px; }
    .logo { font-size: 1.25rem; font-weight: 700; color: var(--blue); }
    .logo span { color: var(--success); }
    nav { flex: 1; }
    .user-menu { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--blue);
              color: #fff; display: flex; align-items: center; justify-content: center;
              font-weight: 700; font-size: 0.9rem; }
    .btn-logout { background: none; border: 1px solid var(--border); color: var(--muted);
                  padding: 6px 14px; border-radius: var(--radius); cursor: pointer;
                  font-size: 0.88rem; }
    .btn-logout:hover { border-color: var(--error); color: var(--error); }

    /* Layout */
    .container { max-width: 900px; margin: 0 auto; padding: 32px 16px; }
    .page-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
    .page-sub { color: var(--muted); font-size: 0.95rem; margin-bottom: 32px; }

    /* Profile card */
    .card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 28px; margin-bottom: 24px; }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .card-title { font-size: 1.05rem; font-weight: 700; }
    .badge-verified { background: #f0fdf4; color: var(--success); border: 1px solid #bbf7d0;
                      font-size: 0.75rem; font-weight: 600; padding: 3px 10px; border-radius: 100px; }
    .badge-unverified { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa;
                        font-size: 0.75rem; font-weight: 600; padding: 3px 10px; border-radius: 100px; }

    .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 560px) { .profile-grid { grid-template-columns: 1fr; } }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.85rem; font-weight: 600; color: var(--muted); }
    input { border: 1.5px solid var(--border); border-radius: var(--radius);
            padding: 9px 12px; font-size: 0.95rem; outline: none; transition: border-color .15s; }
    input:focus { border-color: var(--blue); }
    input[readonly] { background: var(--bg); color: var(--muted); cursor: default; }

    .btn-primary { background: var(--blue); color: #fff; border: none; border-radius: var(--radius);
                   padding: 10px 24px; font-size: 0.95rem; font-weight: 700; cursor: pointer;
                   transition: background .15s; }
    .btn-primary:hover { background: var(--blue-dark); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .alert { border-radius: var(--radius); padding: 10px 14px; font-size: 0.88rem; margin-top: 16px; display: none; }
    .alert.error { background: #fef2f2; border: 1px solid #fecaca; color: var(--error); }
    .alert.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: var(--success); }

    .loading { text-align: center; padding: 60px; color: var(--muted); }
  </style>
</head>
<body>

  <header>
    <div class="logo">Clube<span>USA</span></div>
    <div class="user-menu">
      <div class="avatar" id="avatarInitial">?</div>
      <button class="btn-logout" id="logoutBtn">Sair</button>
    </div>
  </header>

  <div class="container">
    <div id="loadingState" class="loading">Carregando perfil...</div>

    <div id="mainContent" style="display:none">
      <p class="page-title">Meu Painel</p>
      <p class="page-sub">Gerencie suas informações e acompanhe sua conta.</p>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Perfil</span>
          <span id="verifiedBadge" class="badge-verified">✓ Email confirmado</span>
        </div>

        <form id="profileForm" novalidate>
          <div class="profile-grid">
            <div class="form-group full">
              <label for="full_name">Nome completo</label>
              <input type="text" id="full_name" name="full_name" maxlength="100" />
            </div>
            <div class="form-group full">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" readonly />
            </div>
            <div class="form-group">
              <label for="phone">Telefone</label>
              <input type="tel" id="phone" name="phone" maxlength="20" placeholder="+1 (555) 000-0000" />
            </div>
            <div class="form-group">
              <label for="zip_code">ZIP Code</label>
              <input type="text" id="zip_code" name="zip_code" maxlength="10" placeholder="32801" />
            </div>
            <div class="form-group">
              <label for="city">Cidade</label>
              <input type="text" id="city" name="city" maxlength="100" placeholder="Orlando" />
            </div>
            <div class="form-group">
              <label for="state">Estado</label>
              <input type="text" id="state" name="state" maxlength="50" placeholder="FL" />
            </div>
          </div>

          <div style="margin-top: 20px;">
            <button type="submit" class="btn-primary" id="saveBtn">Salvar alterações</button>
          </div>
          <div id="profileAlert" class="alert" role="alert"></div>
        </form>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:8000/api/v1';

    function getToken() { return localStorage.getItem('access_token'); }

    function logout() {
      localStorage.removeItem('access_token');
      localStorage.removeItem('user_id');
      window.location.href = 'login.html';
    }

    // Guard: redirect to login if no token
    if (!getToken()) { window.location.href = 'login.html'; }

    document.getElementById('logoutBtn').addEventListener('click', logout);

    function showAlert(id, msg, type) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className = `alert ${type}`;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    function fillForm(profile) {
      document.getElementById('full_name').value = profile.full_name || '';
      document.getElementById('email').value = profile.email || '';
      document.getElementById('phone').value = profile.phone || '';
      document.getElementById('zip_code').value = profile.zip_code || '';
      document.getElementById('city').value = profile.city || '';
      document.getElementById('state').value = profile.state || '';

      const initial = (profile.full_name || profile.email || '?').charAt(0).toUpperCase();
      document.getElementById('avatarInitial').textContent = initial;

      const badge = document.getElementById('verifiedBadge');
      if (!profile.is_email_verified) {
        badge.textContent = '⚠ Email não confirmado';
        badge.className = 'badge-unverified';
      }
    }

    async function loadProfile() {
      const token = getToken();
      try {
        const resp = await fetch(`${API_URL}/profile/me`, {
          headers: { 'Authorization': `Bearer ${token}` },
        });

        if (resp.status === 401 || resp.status === 403) { logout(); return; }

        const profile = await resp.json();
        fillForm(profile);

        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
      } catch (_) {
        document.getElementById('loadingState').textContent = 'Erro ao carregar perfil. Recarregue a página.';
      }
    }

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Salvando...';

      const body = {};
      const fields = ['full_name', 'phone', 'zip_code', 'city', 'state'];
      fields.forEach(f => {
        const val = document.getElementById(f).value.trim();
        if (val) body[f] = val;
      });

      if (Object.keys(body).length === 0) {
        showAlert('profileAlert', 'Nenhuma alteração detectada.', 'error');
        saveBtn.disabled = false;
        saveBtn.textContent = 'Salvar alterações';
        return;
      }

      try {
        const resp = await fetch(`${API_URL}/profile/me`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${getToken()}`,
          },
          body: JSON.stringify(body),
        });

        if (resp.status === 401 || resp.status === 403) { logout(); return; }

        const data = await resp.json();

        if (resp.ok) {
          fillForm(data);
          showAlert('profileAlert', 'Perfil atualizado com sucesso!', 'success');
        } else {
          const msg = data.detail
            ? (Array.isArray(data.detail) ? data.detail.map(e => e.msg).join('; ') : data.detail)
            : 'Erro ao salvar. Tente novamente.';
          showAlert('profileAlert', msg, 'error');
        }
      } catch (_) {
        showAlert('profileAlert', 'Erro de conexão.', 'error');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Salvar alterações';
      }
    });

    loadProfile();
  </script>
</body>
</html>
