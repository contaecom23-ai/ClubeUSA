<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Início — Clube USA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
    }
    nav {
      background: #1a73e8;
      color: #fff;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav h1 { font-size: 1.2rem; }
    nav button {
      background: rgba(255,255,255,.2);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: .4rem .9rem;
      font-size: .9rem;
      cursor: pointer;
    }
    nav button:hover { background: rgba(255,255,255,.35); }
    .main { max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    .welcome {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .welcome h2 { font-size: 1.2rem; color: #222; margin-bottom: .5rem; }
    .welcome p { color: #555; font-size: .95rem; }
    .profile-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      padding: 1.5rem;
    }
    .profile-card h3 { font-size: 1rem; font-weight: 700; color: #333; margin-bottom: 1rem; }
    .field { margin-bottom: .9rem; }
    .field label { display: block; font-size: .8rem; color: #888; margin-bottom: .2rem; }
    .field span { font-size: .95rem; color: #222; }
    .badge {
      display: inline-block;
      font-size: .75rem;
      padding: .15rem .5rem;
      border-radius: 99px;
      margin-left: .4rem;
    }
    .badge.confirmed { background: #e8f5e9; color: #2e7d32; }
    .coming-soon {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      padding: 1.5rem;
      margin-top: 1.5rem;
      text-align: center;
      color: #888;
      font-size: .9rem;
    }
  </style>
</head>
<body>
  <nav>
    <h1>🇺🇸 Clube USA</h1>
    <button id="logout-btn">Sair</button>
  </nav>

  <div class="main">
    <div class="welcome">
      <h2 id="greeting">Olá! Carregando…</h2>
      <p>Bem-vindo(a) ao Clube USA — sua plataforma para imigrantes brasileiros nos EUA.</p>
    </div>

    <div class="profile-card">
      <h3>Meu Perfil</h3>
      <div class="field">
        <label>Nome</label>
        <span id="profile-name">—</span>
      </div>
      <div class="field">
        <label>E-mail</label>
        <span id="profile-email">—</span>
        <span class="badge confirmed" id="email-badge" style="display:none">✓ confirmado</span>
      </div>
      <div class="field">
        <label>ZIP Code</label>
        <span id="profile-zip">—</span>
      </div>
    </div>

    <div class="coming-soon">
      🚀 Promoções, empregos e moradia — em breve!
    </div>
  </div>

  <script>
    const API = (window.CLUBE_USA_API_URL || 'http://localhost:8000');

    const token = localStorage.getItem('access_token');
    if (!token) { window.location.href = 'login.html'; }

    async function loadProfile() {
      try {
        const res = await fetch(`${API}/users/me`, {
          headers: { 'Authorization': `Bearer ${token}` },
        });
        if (res.status === 401) {
          localStorage.clear();
          window.location.href = 'login.html';
          return;
        }
        const user = await res.json();
        document.getElementById('greeting').textContent = `Olá, ${user.full_name.split(' ')[0]}!`;
        document.getElementById('profile-name').textContent = user.full_name;
        document.getElementById('profile-email').textContent = user.email;
        document.getElementById('profile-zip').textContent = user.zip_code || 'Não informado';
        if (user.email_confirmed) {
          document.getElementById('email-badge').style.display = 'inline-block';
        }
      } catch {
        document.getElementById('greeting').textContent = 'Erro ao carregar perfil.';
      }
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      const refresh = localStorage.getItem('refresh_token');
      try {
        await fetch(`${API}/auth/logout`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ refresh_token: refresh }),
        });
      } finally {
        localStorage.clear();
        window.location.href = 'login.html';
      }
    });

    loadProfile();
  </script>
</body>
</html>
