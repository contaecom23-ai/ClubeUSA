version: "3.9"

# Uso: docker compose up
# Sobe um Postgres local + a API para desenvolvimento sem Supabase.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clubeusa
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: clubeusa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clubeusa"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgresql://clubeusa:localdev@db:5432/clubeusa
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
